<style>
:root{--ink:#1a1a2e;--green:#16a34a;--blue:#2563eb;--accent:#c84b31;--shadow-lg:0 8px 40px rgba(26,26,46,.18);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100vh;min-height:100dvh;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;transition:background .4s;overflow-x:hidden;-webkit-user-select:none;user-select:none;}

/* Pastel backgrounds */
body[data-bg="0"]{background:#fde8e8;}body[data-bg="1"]{background:#e8f4fd;}
body[data-bg="2"]{background:#e8fde8;}body[data-bg="3"]{background:#fdf4e8;}
body[data-bg="4"]{background:#f0e8fd;}body[data-bg="5"]{background:#fde8f4;}
body[data-bg="6"]{background:#e8fdfa;}body[data-bg="7"]{background:#fdfbe8;}
body[data-bg="8"]{background:#ffe8d6;}body[data-bg="9"]{background:#e8eafd;}

/* TOP BAR */
#bar{position:fixed;top:0;left:0;right:0;z-index:50;height:52px;background:rgba(26,26,46,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:10px;}
#barCounter{font-family:monospace;font-size:.8rem;color:rgba(255,255,255,.55);}
#barTimer{font-family:monospace;font-size:1.35rem;font-weight:600;letter-spacing:.03em;}
#barTimer.warn{color:#fbbf24;animation:tp .8s infinite;}
#barTimer.crit{color:#ef4444;}
@keyframes tp{0%,100%{opacity:1}50%{opacity:.35}}

#barDots{display:flex;gap:5px;}
.vd{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);}
.vd.hit{background:#ef4444;box-shadow:0 0 5px #ef4444;}

/* MAIN BODY */
#body{padding:62px 14px 24px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* GLASS CARD */
.glass{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:18px;border:1px solid rgba(255,255,255,.65);box-shadow:var(--shadow-lg);}

label.fl{display:block;font-size:.65rem;font-weight:700;color:rgba(26,26,46,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;text-align:left;}
input[type=text]{width:100%;background:rgba(255,255,255,.95);border:1.5px solid rgba(26,26,46,.15);border-radius:9px;padding:11px 13px;font-family:inherit;font-size:.95rem;color:var(--ink);outline:none;margin-bottom:12px;-webkit-appearance:none;}

<script>
'use strict';

// ── THEME ──
function applyExamTheme(t){
  if(!t)return;
  const logo=t.logo||'🧪';
  const name=t.name||'SecureQuiz';
  // Update page title and favicon
  document.title=name+' — Тест';
  const isUrl=logo.startsWith('http')||logo.startsWith('/');
  let fav=document.querySelector("link[rel~='icon']");
  if(!fav){fav=document.createElement('link');fav.rel='icon';document.head.appendChild(fav);}
  fav.href=isUrl?logo:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>"+encodeURIComponent(logo)+"</text></svg>";
  // Store for use in intro rendering
  window._examTheme={logo,name,isUrl};
}
function loadExamTheme(){
  // Try localStorage first (fast)
  try{
    const t=JSON.parse(localStorage.getItem('sqpro_theme'));
    if(t&&t.name)applyExamTheme(t);
  }catch{}
  // Then Firebase (authoritative)
  if(db){
    db.ref('config/theme').once('value',snap=>{
      const t=snap.val();
      if(t&&t.name){
        localStorage.setItem('sqpro_theme',JSON.stringify(t));
        applyExamTheme(t);
        // Re-render intro emoji/title if already visible
        const emojiEl=document.querySelector('.intro-emoji');
        const titleEl=document.querySelector('.intro-title');
        const t2=window._examTheme;
        if(emojiEl&&t2){
          if(t2.isUrl)emojiEl.innerHTML=`<img src="${t2.logo}" style="width:52px;height:52px;object-fit:contain;border-radius:12px;">`;
          else emojiEl.textContent=t2.logo;
        }
        if(titleEl&&t2)titleEl.textContent=t2.name+' — '+payload?.title;
      }
    }).catch(()=>{});
  }
}


// ══ БЛОК БЕЗ SESSION — одразу при завантаженні скрипта ══
(function(){
  const sid=new URLSearchParams(location.search).get('session');
  if(!sid){
    // Якщо відкрили exam.html напряму без параметра — показуємо заглушку
    document.addEventListener('DOMContentLoaded',()=>{
      document.body.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f0e8;font-family:system-ui;">
        <div style="text-align:center;padding:40px 24px;max-width:360px;">
          <div style="font-size:3rem;margin-bottom:16px;">🔒</div>
          <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:8px;color:#1a1a2e;">Доступ заборонено</h2>
          <p style="font-size:.84rem;color:rgba(26,26,46,.5);line-height:1.65;">Отримайте посилання від вчителя.<br>Ця сторінка не відкривається напряму.</p>
        </div>
      </div>`;
    });
    throw new Error('No session parameter');
  }
})();

// ══ КРИПТО — AES-GCM 256 ══
// Питання шифруються вчителем ключем, який передається ТІЛЬКИ в URL (не в Firebase).
// Після завантаження ключ видаляється з URL і живе лише в пам'яті.
async function _aesKey(raw){
  const enc=new TextEncoder();
  // Паддинг до 32 байт нульовими байтами (не рядком '0')
  const rawBytes=enc.encode(raw);
  const seed=new Uint8Array(32);
  seed.set(rawBytes.slice(0,32));
  return crypto.subtle.importKey('raw',seed,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function encryptData(obj,keyRaw){
  const key=await _aesKey(keyRaw);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return {iv:btoa(String.fromCharCode(...iv)),d:btoa(String.fromCharCode(...new Uint8Array(cipher)))};
}
async function decryptData(enc,keyRaw){
  const key=await _aesKey(keyRaw);
  const iv=Uint8Array.from(atob(enc.iv),c=>c.charCodeAt(0));
  const d=Uint8Array.from(atob(enc.d),c=>c.charCodeAt(0));
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,d);
  return JSON.parse(new TextDecoder().decode(plain));
}

let db=null, payload=null, sessionRef=null;
let examQs=[], examAnswers=[], examViolations=[];
let violCount=0, currentQ=0;
let timerInt=null, perqInt=null, timeLeft=0, perqLeft=0;
let examActive=false;
let studentName='', studentClass='', participantId='';
let multiSel=[];

// ══ WeakMap — правильні відповіді НІКОЛИ не зберігаються у публічних змінних ══
const _correct=new WeakMap();
function _getCorrect(q){return _correct.get(q)||[0];}

// ══ ЗАХИСТ: одноразовий токен результату ══
// Кожна сесія учня отримує унікальний nonce — запобігає повторному відправленню
let _resultSubmitted=false;
const _sessionNonce=crypto.randomUUID();

// ══ ЗАХИСТ: блокуємо DevTools через розрив часу ══
// Коли DevTools відкриті — debugger зупиняє JS і час "зникає"
let _lastTick=Date.now();
setInterval(()=>{
  if(!examActive)return; // тільки під час активного тесту
  const now=Date.now();
  const delta=now-_lastTick;
  _lastTick=now;
  if(delta>4000){ // 4с — безпечний поріг, менший дає хибні спрацювання
    violation('DevTools','Виявлено паузу виконання — підозра на відладчик.');
  }
},1000);

// ── FIREBASE ──
function initFB(){
  try{
    if(typeof FIREBASE_CONFIG==='undefined'||FIREBASE_CONFIG.apiKey==='YOUR_API_KEY')return false;
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    return true;
  }catch(e){return false;}
}

// ── BOOT ──
window.addEventListener('DOMContentLoaded',async()=>{
  const fbOk=initFB();
  loadExamTheme();
  const params=new URLSearchParams(location.search);
  const sid=params.get('session');
  const encKey=params.get('k'); // ключ шифрування з URL

  // Одразу прибираємо ключ з URL (щоб не лишився в history браузера)
  if(encKey){
    const cleanUrl=location.pathname+'?session='+sid;
    history.replaceState({},'',cleanUrl);
  }

  if(sid&&fbOk){
    try{
      const snap=await db.ref('sessions/'+sid).once('value');
      payload=snap.val();
      if(!payload){showErr('Сесія не знайдена або вже закрита.');return;}
      if(payload.status==='stopped'){showStopped();return;}
      // Валідація структури payload
      if(typeof payload!=='object'||typeof payload.sessionId!=='string'){showErr('Пошкоджені дані сесії.');return;}
      if(!encKey&&!payload.encQ&&(!Array.isArray(payload.questions)||!payload.questions.length)){showErr('Тест не містить питань.');return;}

      // Розшифровуємо питання якщо є ключ і шифрування
      if(encKey&&payload.encQ){
        try{
          payload.questions=await decryptData(payload.encQ,encKey);
        }catch(e){
          showErr('Помилка розшифрування. Отримайте нове посилання від вчителя.');return;
        }
      }

      sessionRef=db.ref('sessions/'+sid);
      sessionRef.child('status').on('value',s=>{
        if((s.val()==='stopped')&&examActive)showStopped();
      });
      showIntro();
    }catch(e){showErr('Помилка: '+e.message);}
  } else if(sid){
    showErr('Firebase не налаштовано. Зверніться до вчителя.');
  } else {
    // Fallback localStorage (локальне тестування без Firebase)
    try{
      const raw=localStorage.getItem('sqpro_exam_payload');
      if(!raw)throw new Error('Немає даних тесту');
      payload=JSON.parse(raw);
      if(!payload.questions?.length)throw new Error('Тест порожній');
      showIntro();

function _launchExam(){
  // Будуємо масив питань БЕЗ correctIndices у публічному об'єкті
  examQs=payload.questions.map(q=>{
    const pub={
      text:q.text,
      options:[...(q.options||[])],
      isMultiple:!!q.isMultiple,
      points:q.points||1,
      imageUrl:q.imageUrl||null,
      optionImages:q.optionImages?[...q.optionImages]:null
    };
    // Правильні відповіді — тільки у WeakMap, не у pub
    _correct.set(pub,[...(q.correctIndices||[0])]);
    return pub;
  });

  if(payload.secSettings?.shuffle){
    shuffleArr(examQs);
    examQs.forEach(q=>{
      const corr=_getCorrect(q);
      const corrTxts=corr.map(i=>q.options[i]);
      const pairs=q.options.map((o,i)=>({o,img:q.optionImages?q.optionImages[i]:null}));
      shuffleArr(pairs);
      q.options=pairs.map(p=>p.o);
      q.optionImages=pairs.map(p=>p.img);
      // Оновлюємо WeakMap після перемішування
      _correct.set(q,corrTxts.map(t=>q.options.indexOf(t)).filter(i=>i>=0));
    });
  }

  examAnswers=examQs.map(()=>[]);
  examViolations=[];violCount=0;currentQ=0;multiSel=[];
  examActive=true;

  g('bar').style.display='flex';
  g('progBar').style.display='block';

  buildDots();
  if(payload.secSettings?.wm)buildWM();
  attachSecurity();

  if(payload.timerMode==='perq'){
    perqLeft=payload.timePerQ||30;
    startPerQTimer();
  } else {
    timeLeft=(payload.time||15)*60;
    startTotalTimer();
  }

  renderQ();
  sendProgress({name:studentName,cls:studentClass,current:1,total:examQs.length,status:'active',pct:null});
}

// ── RENDER QUESTION ──
function renderQ(){
  multiSel=[];
  const q=examQs[currentQ];
  const multi=!!q.isMultiple;
  document.body.setAttribute('data-bg',currentQ%10);
  g('prog').style.width=(currentQ/examQs.length*100)+'%';
  g('barCounter').textContent=(currentQ+1)+' / '+examQs.length;

  let optsHtml=q.options.map((o,oi)=>{
    const img=q.optionImages?.[oi];
    const cb=multi?`<span class="opt-cb" id="cb${oi}"></span>`:'';
    return`<div class="opt" id="opt${oi}">
      ${cb}${img?`<img src="${e(img)}" class="opt-img" onerror="this.style.display='none'">`:''}<div class="opt-txt">${e(o)||'...'}</div>
    </div>`;
  }).join('');

  g('body').innerHTML=`
    <div class="q-wrap">
      <div class="glass q-card">
        ${payload.timerMode==='perq'?`<div class="perq-timer" id="perqTimer">${perqLeft}с</div>`:''}
        ${q.imageUrl?`<img src="${e(q.imageUrl)}" class="q-img" onerror="this.style.display='none'">`:''} 
        <div class="q-text">${e(q.text)||'(без тексту)'}</div>
        ${multi?`<div class="multi-hint">Оберіть всі правильні варіанти і натисніть «Підтвердити»</div>`:''}
        <div id="optsWrap">${optsHtml}</div>
        ${multi?`<button class="confirm-btn" id="confirmBtn" onclick="confirmMulti()">✓ Підтвердити відповідь</button>`:''}
      </div>
    </div>`;

  // Attach opt events AFTER innerHTML set
  q.options.forEach((_,oi)=>{
    const el=g('opt'+oi);
    if(!el)return;
    if(multi){
      el.addEventListener('pointerdown',ev=>{ev.preventDefault();doToggle(oi);},{passive:false});
    } else {
      el.addEventListener('pointerdown',ev=>{ev.preventDefault();doPick(oi);},{passive:false});
    }
  });

  if(payload.timerMode==='perq'){
    clearInterval(perqInt);
    perqLeft=payload.timePerQ||30;
    updatePerqDisplay();
    perqInt=setInterval(()=>{
      if(!examActive)return;
      perqLeft--;
      updatePerqDisplay();
      if(perqLeft<=0){clearInterval(perqInt);advance();}
    },1000);
  }
}

function updatePerqDisplay(){
  const el=g('perqTimer');
  if(!el)return;
  el.textContent=perqLeft+'с';
  el.className='perq-timer'+(perqLeft<=5?' crit':perqLeft<=10?' warn':'');
  // Also update bar timer for per-question mode
  const bt=g('barTimer');
  if(bt){
    bt.textContent=String(Math.floor(perqLeft/60)).padStart(2,'0')+':'+String(perqLeft%60).padStart(2,'0');
    bt.className='bar-timer'+(perqLeft<=5?' crit':perqLeft<=10?' warn':'');
  }
}

// ── ANSWER LOGIC ──
function doPick(oi){
  if(!examActive)return;
  examAnswers[currentQ]=[oi];
  // Disable all
  document.querySelectorAll('.opt').forEach(el=>el.classList.add('disabled'));
  const sel=g('opt'+oi);
  if(sel)sel.classList.add('selected');
  clearInterval(perqInt);
  setTimeout(advance,420);
}

function doToggle(oi){
  if(!examActive)return;
  const optEl=g('opt'+oi);
  const cbEl=g('cb'+oi);
  const idx=multiSel.indexOf(oi);
  if(idx>=0){
    multiSel.splice(idx,1);
    if(optEl)optEl.classList.remove('selected-multi');
    if(cbEl)cbEl.classList.remove('checked');
  } else {
    multiSel.push(oi);
    if(optEl)optEl.classList.add('selected-multi');
    if(cbEl)cbEl.classList.add('checked');
  }
}

function confirmMulti(){
  if(!examActive)return;
  examAnswers[currentQ]=[...multiSel];
  document.querySelectorAll('.opt').forEach(el=>el.classList.add('disabled'));
  const btn=g('confirmBtn');if(btn)btn.disabled=true;
  clearInterval(perqInt);
  setTimeout(advance,420);
}

function advance(){
  if(currentQ<examQs.length-1){
    currentQ++;
    sendProgress({current:currentQ+1,total:examQs.length});
    renderQ();
  } else {
    finishExam('submit');
  }
}

// ── SECURITY ──
let _screenW=window.screen.width, _screenH=window.screen.height;
let _splitCheckInt=null;

function attachSecurity(){
  const sec=payload.secSettings||{};
  if(sec.tab){
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('blur',onBlur);
    // Split-screen / floating window / overlay detection
    _splitCheckInt=setInterval(checkSplitScreen,800);
    // Page visibility via VisualViewport (covers overlay attacks)
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize',checkSplitScreen);
    }
  }
  if(sec.ctx)document.addEventListener('contextmenu',onCtx);
  if(sec.copy){document.addEventListener('copy',onCopy);document.addEventListener('cut',onCopy);}
  if(sec.prtsc){
    document.addEventListener('keydown',onKey);
    window.addEventListener('keyup',ev=>{
      if(ev.key==='PrintScreen'||ev.keyCode===44){flashWhite();violation('Print Screen','Спроба зробити знімок екрана.');}
    });
  }
}

function checkSplitScreen(){
  if(!examActive)return;
  const ww=window.innerWidth, wh=window.innerHeight;
  const sw=window.screen.width, sh=window.screen.height;
  // Detect split: window is significantly smaller than screen
  const wRatio=ww/sw, hRatio=wh/sh;
  // Allow for browser chrome (address bar etc) — threshold 0.55
  if(wRatio<0.55||hRatio<0.55){
    violation('Розділений екран','Виявлено розділений екран або плаваюче вікно.');
  }
  // Detect overlay: document not fully visible
  if(document.hidden){return;} // handled by visibilitychange
  // VisualViewport check for floating/picture-in-picture overlays
  if(window.visualViewport){
    const vv=window.visualViewport;
    const vRatio=(vv.width*vv.scale)/sw;
    if(vRatio<0.5){
      violation('Плаваюче вікно','Виявлено плаваюче або накладне вікно.');
    }
  }
}
function detachSecurity(){
  clearInterval(_splitCheckInt);_splitCheckInt=null;
  if(window.visualViewport)window.visualViewport.removeEventListener('resize',checkSplitScreen);
  document.removeEventListener('visibilitychange',onVis);
  window.removeEventListener('blur',onBlur);
  document.removeEventListener('contextmenu',onCtx);
  document.removeEventListener('copy',onCopy);
  document.removeEventListener('cut',onCopy);
  document.removeEventListener('keydown',onKey);
  g('wmLayer').innerHTML='';
}
function onVis(){if(!examActive||!document.hidden)return;violation('Перехід на іншу вкладку','Ви залишили вікно тесту.');if(payload.secSettings?.blur)blurBody(true);}
function onBlur(){if(!examActive||document.hidden)return;violation('Втрата фокусу','Перехід до іншого вікна.');if(payload.secSettings?.blur)blurBody(true);}
function onCtx(ev){ev.preventDefault();if(!examActive)return;violation('Контекстне меню','Спроба відкрити контекстне меню.');}
function onCopy(ev){ev.preventDefault();if(!examActive)return;violation('Копіювання','Спроба скопіювати текст тесту.');}
function onKey(ev){
  if(!examActive)return;
  if(ev.key==='PrintScreen'||ev.keyCode===44){ev.preventDefault();flashWhite();violation('Print Screen','Спроба зробити знімок.');return;}
  if(ev.key==='F12'||(ev.ctrlKey&&ev.shiftKey&&'IJCK'.includes(ev.key.toUpperCase()))||(ev.ctrlKey&&ev.key==='u')){ev.preventDefault();violation('DevTools','Спроба відкрити інструменти розробника.');}
}
function blurBody(on){g('body').style.filter=on?'blur(14px)':'';}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&examActive)blurBody(false);});
function flashWhite(){
  const f=document.createElement('div');
  f.style.cssText='position:fixed;inset:0;background:#fff;z-index:99999;pointer-events:none;';
  document.body.appendChild(f);setTimeout(()=>f.remove(),350);
}

function buildDots(){
  const max=payload.secSettings?.maxviol||3;
  ['barDots','secVdots'].forEach(id=>{
    const c=g(id);if(!c)return;c.innerHTML='';
    for(let i=0;i<max;i++){const d=document.createElement('div');d.className='vd';d.id=id+'_'+i;c.appendChild(d);}
  });
}
let _lastViolTime=0;
function violation(title,desc){
  if(!examActive)return;
  // Дедублікація: ігнорувати повторне порушення того ж типу протягом 1.5с
  const now=Date.now();
  if(now-_lastViolTime<1500)return;
  _lastViolTime=now;
  violCount++;
  examViolations.push({title,desc,time:new Date().toLocaleTimeString('uk-UA'),q:currentQ+1});
  ['barDots','secVdots'].forEach(id=>{const d=g(id+'_'+(violCount-1));if(d)d.classList.add('hit');});
  g('secTitle').textContent=title;
  g('secDesc').textContent=desc+'\n\nПорушення '+violCount+' з '+(payload.secSettings?.maxviol||3)+'.';
  g('secOverlay').classList.add('show');
  if(violCount>=(payload.secSettings?.maxviol||3)){
    setTimeout(()=>{dismissSec();finishExam('violations');},1500);
  }
}
function dismissSec(){g('secOverlay').classList.remove('show');blurBody(false);}

function buildWM(){
  const wl=g('wmLayer');wl.innerHTML='';
  const t=studentName+(studentClass?' · '+studentClass:'')+' · SecureQuiz';
  for(let r=-2;r<20;r++)for(let c=-1;c<8;c++){
    const el=document.createElement('div');el.className='wm';el.textContent=t;
    el.style.top=(r*130)+'px';el.style.left=(c*320)+'px';wl.appendChild(el);
  }
}

// ── FIREBASE ──
let _lastProgressSend=0;
function sendProgress(data){
  if(!db||!sessionRef)return;
  const now=Date.now();
  // Rate-limit: не надсилати частіше ніж раз на 2 секунди
  if(now-_lastProgressSend<2000)return;
  _lastProgressSend=now;
  sessionRef.child('participants/'+participantId).update(data).catch(()=>{});
}

// ── FINISH ──
function finishExam(reason){
  // ══ Захист від повторного виклику ══
  if(_resultSubmitted){return;}
  _resultSubmitted=true;

  examActive=false;
  clearInterval(timerInt);clearInterval(perqInt);
  detachSecurity();
  g('bar').style.display='none';g('progBar').style.display='none';
  document.body.setAttribute('data-bg','0');

  // Scoring
  let earned=0,totalPts=0;
  examQs.forEach((q,i)=>{
    const pts=q.points||1; totalPts+=pts;
    const ans=examAnswers[i]||[];
    const corr=_getCorrect(q);
    const ok=q.isMultiple
      ?(ans.length===corr.length&&corr.every(c=>ans.includes(c)))
      :(ans[0]===corr[0]);
    if(ok)earned+=pts;
  });
  const pct=totalPts>0?Math.round(earned/totalPts*100):0;
  const correctCnt=examQs.filter((q,i)=>{
    const ans=examAnswers[i]||[],corr=_getCorrect(q);
    return q.isMultiple?(ans.length===corr.length&&corr.every(c=>ans.includes(c))):(ans[0]===corr[0]);
  }).length;

  // Grade
  const grades=payload.grades||[];
  let grade={l:'1',c:'#7f1d1d',motto:''};
  for(const g2 of grades){if(pct>=g2.m){grade=g2;break;}}

  // Motto from grade or fallback
  const motto=grade.motto||(pct>=75?'Ти топ! Так тримати 🔥':pct>=50?'Ще трохи — і будеш у топі 🚀':pct>=25?'Набираєш обертів! Не зупиняйся 💪':'Старт є — далі тільки вгору 📈');
  const subT=reason==='time'?'⏰ Час вийшов':reason==='violations'?'⛔ Зупинено за порушення':'✅ Тест завершено';

  // Viol log
  let violHtml='';
  if(examViolations.length){
    violHtml=`<div class="viol-log"><div class="viol-log-title">🚨 Порушення (${examViolations.length})</div>
      ${examViolations.map(v=>`<div class="viol-item">[${v.time}] Q${v.q}: <strong style="color:#ef4444">${v.title}</strong></div>`).join('')}
    </div>`;
  }

  // ══ Fingerprint пристрою — допомагає виявити одну людину з кількох акаунтів ══
  const _fp={
    ua:navigator.userAgent.slice(0,80),
    lang:navigator.language,
    tz:Intl.DateTimeFormat().resolvedOptions().timeZone,
    w:screen.width,h:screen.height,
    cores:navigator.hardwareConcurrency||0,
    nonce:_sessionNonce
  };

  // Save result
  const result={
    sessionId:payload.sessionId,student:studentName,
    cls:studentClass,
    launchClass:studentClass||'',
    test:payload.title||'Тест',subject:payload.subject||'',
    date:new Date().toLocaleDateString('uk-UA'),
    startedAt:payload.startedAt,ts:Date.now(),
    earned:+earned.toFixed(1),total:totalPts,pct,
    grade:grade.l,gradeColor:grade.c,violations:violCount,reason,
    _fp,
    answersSnapshot:examQs.map((q,i)=>({
      text:q.text,options:q.options,
      correctIndices:_getCorrect(q),
      isMultiple:!!q.isMultiple,
      given:examAnswers[i]||[]
    }))
  };
  // localStorage fallback — зберігаємо БЕЗ правильних відповідей
  try{
    const safeResult={...result};
    // Видаляємо правильні відповіді з локального збереження
    if(safeResult.answersSnapshot){
      safeResult.answersSnapshot=safeResult.answersSnapshot.map(a=>({
        text:a.text,given:a.given,isMultiple:a.isMultiple
        // correctIndices НЕ зберігаємо локально
      }));
    }
    const rs=JSON.parse(localStorage.getItem('sqpro_results')||'[]');
    rs.unshift(safeResult);
    localStorage.setItem('sqpro_results',JSON.stringify(rs.slice(0,500)));
  }catch(e){}

  // Підписуємо результат HMAC-SHA256 щоб вчитель міг перевірити цілісність
  // Підпис = hash(sessionId + studentName + pct + ts) — видно в результатах як поле _sig
  (async()=>{
    try{
      const msg=new TextEncoder().encode([result.sessionId,result.student,result.pct,result.ts,_sessionNonce].join('|'));
      // Використовуємо весь sessionId (48 hex символів) + nonce як ключовий матеріал
      const keyMaterial=new TextEncoder().encode((result.sessionId+_sessionNonce).slice(0,32).padEnd(32,'x'));
      const key=await crypto.subtle.importKey('raw',keyMaterial,{name:'HMAC',hash:'SHA-256'},false,['sign']);
      const sig=await crypto.subtle.sign('HMAC',key,msg);
      result._sig=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
    }catch(e){}
    // Firebase — зберігаємо після підпису
    if(db){
      const key=participantId+'_r';
      db.ref('results/'+key).set(result).catch(()=>{});
      sendProgress({name:studentName,cls:studentClass,status:'done',pct,grade:grade.l,violations:violCount,current:examQs.length,total:examQs.length});
    }
  })();

  // Arc circumference
  const R=54, C=2*Math.PI*R;
  const arc=Math.round(C*pct/100), gap=Math.round(C*(1-pct/100));

  // Grade emoji
  const gradeEmoji=pct>=75?'🏆':pct>=50?'⭐':pct>=25?'💪':'📈';

  g('body').innerHTML=`
    <div class="result-wrap">
      <div class="result-card-new">

        <!-- Motivational motto — prominent at top -->
        <div class="rc-motto-big">${gradeEmoji} ${motto}</div>

        <!-- GRADE — the hero element, huge number -->
        <div class="rc-grade-hero" style="background:linear-gradient(160deg,${grade.c}18 0%,${grade.c}06 100%);border:2.5px solid ${grade.c}35;">
          <div class="rc-grade-label" style="color:${grade.c}88;">ОЦІНКА</div>
          <div class="rc-grade-giant" style="color:${grade.c};">${grade.l}</div>
          <div class="rc-pct" style="color:${grade.c}bb;">${pct}%  &nbsp;·&nbsp;  ${earned.toFixed(1)} / ${totalPts} б.</div>
        </div>

        <!-- Status line -->
        <div style="font-size:.78rem;color:rgba(26,26,46,.45);text-align:center;margin-bottom:10px;">${subT}</div>

        <!-- Stats -->
        <div class="rc-stats">
          <div class="rc-stat"><div class="rc-stat-val" style="color:#16a34a">${correctCnt}</div><div class="rc-stat-lbl">✓ правильно</div></div>
          <div class="rc-stat-div"></div>
          <div class="rc-stat"><div class="rc-stat-val" style="color:#c84b31">${examQs.length-correctCnt}</div><div class="rc-stat-lbl">✗ неправильно</div></div>
          <div class="rc-stat-div"></div>
          <div class="rc-stat"><div class="rc-stat-val" style="color:#f59e0b">${violCount}</div><div class="rc-stat-lbl">⚠ порушень</div></div>
        </div>

        ${violHtml}

        <div class="rc-saved">✓ Результат збережено в журналі вчителя</div>
        <button class="btn-close" onclick="closeWin()">✕ Закрити вікно</button>
      </div>
    </div>`;
}

function closeWin(){
  window.close();
  setTimeout(()=>{
    g('body').innerHTML=`<div style="text-align:center;padding:40px 20px;"><div style="font-size:2rem;margin-bottom:12px;">✅</div><p style="font-size:.9rem;color:rgba(26,26,46,.45);">Тест завершено. Закрийте цю вкладку.</p></div>`;
  },300);
}

// ── UTILS ──
function g(id){return document.getElementById(id);}
function e(s){if(!s)return'';const d=document.createElement('div');d.appendChild(document.createTextNode(String(s)));return d.innerHTML;}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ══ Глобальний блок DevTools (діє з моменту завантаження) ══
document.addEventListener('keydown',ev=>{
  const ck=ev.ctrlKey||ev.metaKey;
  if(ev.key==='F12'||(ck&&ev.shiftKey&&'IJCK'.includes(ev.key.toUpperCase()))||(ck&&ev.key.toLowerCase()==='u')||(ck&&ev.key.toLowerCase()==='s')){
    ev.preventDefault();ev.stopPropagation();
    if(examActive)violation('DevTools','Спроба відкрити інструменти розробника.');
  }
},true);
</script>
