<style>
:root{--ink:#1a1a2e;--green:#16a34a;--blue:#2563eb;--accent:#c84b31;--shadow-lg:0 8px 40px rgba(26,26,46,.18);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100vh;min-height:100dvh;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;transition:background .4s;overflow-x:hidden;-webkit-user-select:none;user-select:none;}

/* Pastel backgrounds */
body[data-bg="0"]{background:#fde8e8;}body[data-bg="1"]{background:#e8f4fd;}
body[data-bg="2"]{background:#e8fde8;}body[data-bg="3"]{background:#fdf4e8;}
body[data-bg="4"]{background:#f0e8fd;}body[data-bg="5"]{background:#fde8f4;}
body[data-bg="6"]{background:#e8fdfa;}body[data-bg="7"]{background:#fdfbe8;}
body[data-bg="8"]{background:#ffe8d6;}body[data-bg="9"]{background:#e8eafd;}

/* TOP BAR */
#bar{position:fixed;top:0;left:0;right:0;z-index:50;height:52px;background:rgba(26,26,46,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:10px;}
#barCounter{font-family:monospace;font-size:.8rem;color:rgba(255,255,255,.55);}
#barTimer{font-family:monospace;font-size:1.35rem;font-weight:600;letter-spacing:.03em;}
#barTimer.warn{color:#fbbf24;animation:tp .8s infinite;}
#barTimer.crit{color:#ef4444;}
@keyframes tp{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
#barDots{display:flex;gap:5px;}
.vd{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);}
.vd.hit{background:#ef4444;box-shadow:0 0 5px #ef4444;}
#progBar{position:fixed;top:52px;left:0;right:0;height:3px;background:rgba(0,0,0,.08);z-index:49;}
#prog{height:100%;background:rgba(26,26,46,.4);transition:width .4s;}

/* MAIN BODY */
#body{padding:62px 14px 24px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* GLASS CARD */
.glass{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:18px;border:1px solid rgba(255,255,255,.65);box-shadow:var(--shadow-lg);}

/* INTRO */
.intro-wrap{width:100%;max-width:460px;}
.intro-card{padding:28px 24px;text-align:center;}
.intro-emoji{font-size:2.8rem;margin-bottom:12px;}
.intro-title{font-size:1.4rem;font-weight:800;margin-bottom:5px;color:var(--ink);}
.intro-meta{font-size:.82rem;color:rgba(26,26,46,.45);margin-bottom:18px;}
label.fl{display:block;font-size:.65rem;font-weight:700;color:rgba(26,26,46,.4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;text-align:left;}
input[type=text]{width:100%;background:rgba(255,255,255,.95);border:1.5px solid rgba(26,26,46,.15);border-radius:9px;padding:11px 13px;font-family:inherit;font-size:.95rem;color:var(--ink);outline:none;margin-bottom:12px;-webkit-appearance:none;}
input[type=text]:focus{border-color:var(--ink);}
.intro-rules{background:rgba(26,26,46,.05);border-radius:9px;padding:12px 14px;text-align:left;margin:0 0 16px;font-size:.79rem;line-height:1.85;}
.btn-start{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:11px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;}
.btn-start:active{opacity:.85;}

/* QUESTION */
.q-wrap{width:100%;max-width:620px;}
.q-card{padding:22px 18px;}
.q-text{font-size:1.08rem;font-weight:800;line-height:1.5;margin-bottom:16px;color:#1e3a5f;background:rgba(255,255,255,.7);border-radius:10px;padding:13px 15px;border-left:4px solid #3b82f6;}
.q-img{width:100%;max-height:200px;object-fit:contain;border-radius:9px;margin-bottom:12px;display:block;}
.multi-hint{font-size:.72rem;color:var(--blue);font-weight:600;margin-bottom:10px;font-style:italic;}

/* OPTIONS — pastel colors per position */
.opt{display:flex;align-items:center;gap:11px;padding:13px 14px;border-radius:12px;margin-bottom:8px;cursor:pointer;min-height:50px;border:2px solid transparent;transition:border-color .15s,transform .1s,opacity .1s;}
.opt:nth-of-type(1){background:#fef3c7;}
.opt:nth-of-type(2){background:#dbeafe;}
.opt:nth-of-type(3){background:#dcfce7;}
.opt:nth-of-type(4){background:#fce7f3;}
.opt:nth-of-type(5){background:#ede9fe;}
.opt:nth-of-type(6){background:#ffedd5;}
.opt.active-touch{transform:scale(.97);opacity:.75;}
.opt.selected{background:#1e40af!important;border-color:#1e40af!important;color:#fff;}
.opt.selected-multi{border-color:#2563eb!important;box-shadow:0 0 0 2px rgba(37,99,235,.2);}

.opt-cb{width:20px;height:20px;border-radius:5px;border:2px solid rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;font-size:13px;font-weight:800;color:#fff;transition:background .12s;}
.opt-cb.checked{background:#2563eb;border-color:#2563eb;}
.opt-txt{font-size:.9rem;font-weight:500;line-height:1.35;flex:1;}
.opt-img{max-height:50px;max-width:80px;object-fit:contain;border-radius:6px;flex-shrink:0;}
.confirm-btn{width:100%;margin-top:12px;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:11px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;}
.confirm-btn:active{opacity:.85;}

/* PERQ TIMER */
.perq-timer{text-align:center;font-family:monospace;font-size:1.5rem;font-weight:700;color:rgba(26,26,46,.3);margin-bottom:12px;}
.perq-timer.warn{color:#d97706;}
.perq-timer.crit{color:#ef4444;animation:tp .5s infinite;}

/* RESULT */
.result-wrap{width:100%;max-width:500px;}

/* New result card */
.result-card-new{background:rgba(255,255,255,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:22px;border:1px solid rgba(255,255,255,.7);box-shadow:0 12px 48px rgba(26,26,46,.16);padding:24px 20px;text-align:center;}

/* Motivational motto */
.rc-motto-big{font-size:1.1rem;font-weight:800;color:rgba(26,26,46,.75);margin-bottom:16px;letter-spacing:-.01em;line-height:1.35;}

/* Grade hero block */

.rc-grade-label{font-size:.65rem;font-weight:900;letter-spacing:.3em;text-transform:uppercase;color:rgba(26,26,46,.38);margin-bottom:10px;}

}

.rc-pct{font-size:.88rem;font-weight:700;opacity:.65;margin-bottom:2px;}
.rc-score{font-family:monospace;font-size:.82rem;color:rgba(26,26,46,.45);}
.rc-stats{display:flex;align-items:center;background:rgba(255,255,255,.6);border-radius:13px;padding:14px 8px;margin-bottom:12px;gap:0;}
.rc-stat{flex:1;text-align:center;}
.rc-stat-val{font-size:1.75rem;font-weight:800;line-height:1;margin-bottom:3px;}
.rc-stat-lbl{font-size:.62rem;color:rgba(26,26,46,.45);font-weight:600;}

#secOverlay{display:none;position:fixed;inset:0;background:#000;z-index:999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;color:#fff;}

.sec-icon{font-size:3.5rem;margin-bottom:14px;animation:shake .4s;}

.sec-main{font-size:1.25rem;font-weight:800;color:#ef4444;margin-bottom:8px;line-height:1.3;}
.sec-sub{font-size:.92rem;font-weight:600;color:#fca5a5;margin-bottom:6px;}
.sec-desc{color:rgba(255,100,100,.5);max-width:340px;line-height:1.7;margin-bottom:20px;font-size:.83rem;}
.sec-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;}
.btn-cont{padding:11px 28px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;}

/* MOOD CHECK */

.mood-sub{font-size:.83rem;color:rgba(26,26,46,.45);margin-bottom:22px;line-height:1.5;}
.mood-emojis{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.mood-btn{width:62px;height:72px;border:2.5px solid transparent;border-radius:16px;background:rgba(255,255,255,.7);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:inherit;transition:transform .15s,border-color .15s,background .15s;-webkit-tap-highlight-color:transparent;}

#wmLayer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}

/* STOPPED */

<script>
'use strict';

// ── THEME ──
function applyExamTheme(t){
  if(!t)return;
  const logo=t.logo||'🧪';
  const name=t.name||'SecureQuiz';
  // Update page title and favicon
  document.title=name+' — Тест';
  const isUrl=logo.startsWith('http')||logo.startsWith('/');
  let fav=document.querySelector("link[rel~='icon']");
  if(!fav){fav=document.createElement('link');fav.rel='icon';document.head.appendChild(fav);}
  fav.href=isUrl?logo:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>"+encodeURIComponent(logo)+"</text></svg>";
  // Store for use in intro rendering
  window._examTheme={logo,name,isUrl};
}
function loadExamTheme(){
  // Try localStorage first (fast)
  try{
    const t=JSON.parse(localStorage.getItem('sqpro_theme'));
    if(t&&t.name)applyExamTheme(t);
  }catch{}
  // Then Firebase (authoritative)
  if(db){
    db.ref('config/theme').once('value',snap=>{
      const t=snap.val();
      if(t&&t.name){
        localStorage.setItem('sqpro_theme',JSON.stringify(t));
        applyExamTheme(t);
        // Re-render intro emoji/title if already visible
        const emojiEl=document.querySelector('.intro-emoji');
        const titleEl=document.querySelector('.intro-title');
        const t2=window._examTheme;
        if(emojiEl&&t2){
          if(t2.isUrl)emojiEl.innerHTML=`<img src="${t2.logo}" style="width:52px;height:52px;object-fit:contain;border-radius:12px;">`;
          else emojiEl.textContent=t2.logo;
        }
        if(titleEl&&t2)titleEl.textContent=t2.name+' — '+payload?.title;
      }
    }).catch(()=>{});
  }
}


// ══ БЛОК БЕЗ SESSION — одразу при завантаженні ══
(function(){
  const sid=new URLSearchParams(location.search).get('session');
  if(!sid){
    document.addEventListener('DOMContentLoaded',()=>{
      document.body.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f0e8;font-family:system-ui;">
        <div style="text-align:center;padding:40px 24px;max-width:360px;">
          <div style="font-size:3rem;margin-bottom:16px;">🔒</div>
          <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:8px;color:#1a1a2e;">Доступ заборонено</h2>
          <p style="font-size:.84rem;color:rgba(26,26,46,.5);line-height:1.65;">Отримайте посилання від вчителя.<br>Ця сторінка не відкривається напряму.</p>
        </div>
      </div>`;
    });
    throw new Error('No session parameter');
  }
})();

// ══ БЛОКУВАННЯ TELEGRAM / ВБУДОВАНИХ WEBVIEW ══
(function(){
  const ua=navigator.userAgent||'';
  // Telegram ін'єктує window.Telegram.WebApp у всі свої WebView
  const isTgObj=!!(window.Telegram?.WebApp||window.TelegramWebviewProxy);
  // UA-рядки Telegram WebView (Android і iOS)
  const isTgUa=/\bTelegram\b/i.test(ua)||/TelegramBot/i.test(ua);
  // Загальні вбудовані WebView (Instagram, Facebook, TikTok, Snapchat тощо)
  // На Android вбудований WebView не має 'Chrome' АБО має 'wv'
  const isAndroidWV=(/Android/i.test(ua))&&(/wv\b/.test(ua)||!/Chrome/i.test(ua));
  // iOS WebView — є WebKit але немає Safari в UA (Safari додає "Safari/xxx")
  const isIosWV=(/iPhone|iPad|iPod/i.test(ua))&&/WebKit/i.test(ua)&&!/Safari/i.test(ua);
  // Відомі in-app браузери соцмереж
  const isSocialWV=/FBAN|FBAV|Instagram|Line\/|Snapchat|TikTok|Pinterest/i.test(ua);

  if(isTgObj||isTgUa||isAndroidWV||isIosWV||isSocialWV){
    const isIos=/iPhone|iPad|iPod/i.test(ua);
    const hint=isIos
      ?'Натисніть ••• → «Відкрити у Safari»'
      :'Натисніть ⋮ → «Відкрити у Chrome» або скопіюйте посилання';
    document.addEventListener('DOMContentLoaded',()=>{
      document.body.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f0e8;font-family:system-ui;padding:20px;">
        <div style="text-align:center;max-width:340px;">
          <div style="font-size:3rem;margin-bottom:16px;">🌐</div>
          <h2 style="font-size:1.15rem;font-weight:800;margin-bottom:10px;color:#1a1a2e;">Відкрийте у браузері</h2>
          <p style="font-size:.84rem;color:rgba(26,26,46,.55);line-height:1.7;margin-bottom:18px;">Тест не можна проходити у вбудованому браузері Telegram або соціальних мереж — захист від списування тут не працює.</p>
          <div style="background:rgba(37,99,235,.08);border-radius:10px;padding:12px 16px;font-size:.82rem;color:#1e3a5f;font-weight:600;">${hint}</div>
        </div>
      </div>`;
    });
    throw new Error('Unsupported WebView environment');
  }
})();

// ══ КРИПТО — AES-GCM 256 ══
async function _aesKey(raw){
  const enc=new TextEncoder();
  const seed=enc.encode((raw+'00000000000000000000000000000000').slice(0,32));
  return crypto.subtle.importKey('raw',seed,{name:'AES-GCM'},false,['encrypt','decrypt']);
}
async function decryptData(enc,keyRaw){
  const key=await _aesKey(keyRaw);
  const iv=Uint8Array.from(atob(enc.iv),c=>c.charCodeAt(0));
  const d=Uint8Array.from(atob(enc.d),c=>c.charCodeAt(0));
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,d);
  return JSON.parse(new TextDecoder().decode(plain));
}

let db=null, payload=null, sessionRef=null;
let examQs=[], examAnswers=[], examViolations=[];
let violCount=0, currentQ=0;
let timerInt=null, perqInt=null, timeLeft=0, perqLeft=0;
let examActive=false;
let studentName='', studentClass='', participantId='';
let multiSel=[];

// ══ WeakMap — правильні відповіді не в публічних змінних ══
const _correct=new WeakMap();
function _getCorrect(q){return _correct.get(q)||[0];}

// ══ Одноразовий прапор результату ══
let _resultSubmitted=false;
const _sessionNonce=crypto.randomUUID();

// ══ Детектор debugger-паузи ══
let _lastTick=Date.now();
setInterval(()=>{
  const now=Date.now();const delta=now-_lastTick;_lastTick=now;
  if(!examActive||_resultSubmitted||document.hidden)return;
  if(delta>4000)violation('DevTools','Виявлено паузу виконання — підозра на відладчик.');
},1000);
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){_lastTick=Date.now();if(examActive)blurBody(false);}
});

// ── FIREBASE ──
function initFB(){
  try{
    if(typeof FIREBASE_CONFIG==='undefined'||FIREBASE_CONFIG.apiKey==='YOUR_API_KEY')return false;
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    return true;
  }catch(e){return false;}
}

// ── BOOT ──
window.addEventListener('DOMContentLoaded',async()=>{
  const fbOk=initFB();
  loadExamTheme();
  const params=new URLSearchParams(location.search);
  const sid=params.get('session');
  const encKey=params.get('k');
  // Видаляємо ключ з URL одразу після зчитування
  if(encKey){history.replaceState({},'',location.pathname+'?session='+sid);}

  if(sid&&fbOk){
    try{
      const snap=await db.ref('sessions/'+sid).once('value');
      payload=snap.val();
      if(!payload){showErr('Сесія не знайдена або вже закрита.');return;}
      if(payload.status==='stopped'){showStopped();return;}

      // Розшифровуємо питання якщо є ключ
      if(encKey&&payload.encQ){
        try{
          payload.questions=await decryptData(payload.encQ,encKey);
        }catch(e){
          showErr('Помилка розшифрування. Отримайте нове посилання від вчителя.');return;
        }
      }

      sessionRef=db.ref('sessions/'+sid);
      sessionRef.child('status').on('value',s=>{
        if((s.val()==='stopped')&&examActive)showStopped();
      });
      showIntro();
    }catch(e){showErr('Помилка: '+e.message);}
  } else if(sid){
    // Firebase not configured but session ID present
    showErr('Firebase не налаштовано. Зверніться до вчителя.');
  } else {
    // Fallback localStorage (local testing)
    try{
      const raw=localStorage.getItem('sqpro_exam_payload');
      if(!raw)throw new Error('Немає даних тесту');
      payload=JSON.parse(raw);
      if(!payload.questions?.length)throw new Error('Тест порожній');
      showIntro();
    }catch(e){showErr(e.message);}
  }
});

function _launchExam(){

      optionImages:q.optionImages?[...q.optionImages]:null
    };
    // Правильні відповіді — тільки у WeakMap, не у pub
    _correct.set(pub,[...(q.correctIndices||[0])]);
    return pub;
  });

  if(payload.secSettings?.shuffle){
    shuffleArr(examQs);
    examQs.forEach(q=>{

      shuffleArr(pairs);
      q.options=pairs.map(p=>p.o);
      q.optionImages=pairs.map(p=>p.img);
      // Оновлюємо WeakMap після перемішування
      _correct.set(q,corrTxts.map(t=>q.options.indexOf(t)).filter(i=>i>=0));
    });

// ══ ZERO-WIDTH ОБФУСКАЦІЯ — захист від TTS / ШІ-зчитування / OCR ══
// Вставляє невидимі Unicode-символи між кожним символом тексту.
// Людське око не бачить різниці. TTS, копіювання і ШІ-агенти отримують кашу.
const _ZW=['\u200B','\u200C','\u200D','\uFEFF','\u2060'];
function _zwObfuscate(str){
  if(!str)return str;
  // Не обфускуємо порожні рядки та рядки з лише пробілами
  const s=String(str);
  let out='';
  for(let i=0;i<s.length;i++){
    out+=s[i];
    // Вставляємо випадковий ZW-символ після кожного видимого символу (крім останнього)
    if(i<s.length-1)out+=_ZW[(i*7+s.charCodeAt(i))%_ZW.length];
  }
  return out;
}
// Обгортка: escapes HTML і потім обфускує (тільки якщо увімкнено s-zwc)
function sec(str){
  if(!str)return'';
  const escaped=e(str);
  // payload може бути null під час intro — тоді обфускуємо за замовчуванням
  if(payload&&payload.secSettings&&payload.secSettings.zwc===false)return escaped;
  return _zwObfuscate(escaped);
}

    return`<div class="opt" id="opt${oi}">
      ${cb}${img?`<img src="${e(img)}" class="opt-img" onerror="this.style.display='none'">`:''}<div class="opt-txt">${sec(o)||'...'}</div>
    </div>`;
  }).join('');

    </div>`;

  // Attach opt events AFTER innerHTML set
  q.options.forEach((_,oi)=>{
    const el=g('opt'+oi);
    if(!el)return;
    if(multi){
      el.addEventListener('pointerdown',ev=>{ev.preventDefault();doToggle(oi);},{passive:false});
    } else {
      el.addEventListener('pointerdown',ev=>{ev.preventDefault();doPick(oi);},{passive:false});
    }
  });

  if(payload.timerMode==='perq'){
    clearInterval(perqInt);
    perqLeft=payload.timePerQ||30;

      if(!examActive)return;

function updatePerqDisplay(){
  const el=g('perqTimer');

    bt.textContent=String(Math.floor(perqLeft/60)).padStart(2,'0')+':'+String(perqLeft%60).padStart(2,'0');

let _qStartTime=0;

function doPick(oi){
  if(!examActive)return;
  const timeSpent=Date.now()-_qStartTime;
  examAnswers[currentQ]=[oi];
  if(!examAnswers._times)examAnswers._times=[];
  examAnswers._times[currentQ]=timeSpent;
  // Disable all
  document.querySelectorAll('.opt').forEach(el=>el.classList.add('disabled'));
  const sel=g('opt'+oi);
  if(sel)sel.classList.add('selected');
  clearInterval(perqInt);
  setTimeout(advance,420);
}

function doToggle(oi){
  if(!examActive)return;
  const optEl=g('opt'+oi);
  const cbEl=g('cb'+oi);
  const idx=multiSel.indexOf(oi);
  if(idx>=0){
    multiSel.splice(idx,1);
    if(optEl)optEl.classList.remove('selected-multi');
    if(cbEl)cbEl.classList.remove('checked');
  } else {
    multiSel.push(oi);
    if(optEl)optEl.classList.add('selected-multi');
    if(cbEl)cbEl.classList.add('checked');
  }
}

function confirmMulti(){
  if(!examActive)return;
  examAnswers[currentQ]=[...multiSel];
  if(!examAnswers._times)examAnswers._times=[];
  examAnswers._times[currentQ]=Date.now()-_qStartTime;
  document.querySelectorAll('.opt').forEach(el=>el.classList.add('disabled'));
  const btn=g('confirmBtn');if(btn)btn.disabled=true;
  clearInterval(perqInt);
  setTimeout(advance,420);
}

function advance(){
  if(currentQ<examQs.length-1){
    currentQ++;
    sendProgress({current:currentQ+1,total:examQs.length});
    renderQ();
  } else {
    finishExam('submit');
  }
}

let _screenW=window.screen.width, _screenH=window.screen.height;
let _splitCheckInt=null;

// ── МОБІЛЬНІ ЗАХИСТИ — змінні стану ──
let _rafId=null, _rafLastTs=0, _rafPauseTimer=null;
let _blurTimer=null, _blurPendingAt=0;
let _fsActive=false, _fsExitViolTimer=null;
let _lastOrient=(screen.orientation?.angle??window.orientation??0);
let _orientChangeTime=0;
let _pipCheckInt=null;

let _basePixelRatio=window.devicePixelRatio||1;
let _baseBodyW=0,_baseBodyH=0;
let _resizeObs=null;
let _colorosCheckInt=null;
let _notifBarTimer=null;

function attachSecurity(){
  const sec=payload.secSettings||{};
  if(sec.tab){
    document.addEventListener('visibilitychange',onVis);
    window.addEventListener('blur',onBlur);
    // Split-screen / floating window / overlay detection
    _splitCheckInt=setInterval(checkSplitScreen,800);
    // Page visibility via VisualViewport (covers overlay attacks)
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize',checkSplitScreen);
    }
  }
  if(sec.ctx)document.addEventListener('contextmenu',onCtx);
  if(sec.copy){document.addEventListener('copy',onCopy);document.addEventListener('cut',onCopy);}
  // Завжди реєструємо keydown — і prtsc і devtools
  document.addEventListener('keydown',onKey);
  window.addEventListener('keyup',ev=>{
    if(ev.key==='PrintScreen'||ev.keyCode===44){
      flashWhite();
      violation('Print Screen','Спроба зробити знімок екрана.');
    }
  });

  // ══ МОБІЛЬНІ ЗАХИСТИ ══

  // 1. RAF-детектор зупинки анімації (шторка, інший додаток)
  if(sec.raf){
    _rafLastTs=performance.now();
    const rafLoop=(ts)=>{
      if(!examActive||_resultSubmitted){_rafId=null;return;}
      const delta=ts-_rafLastTs;
      _rafLastTs=ts;
      // delta > 2500ms і вкладка видима і фокус є — підозра на шторку/overlay
      if(delta>2500&&!document.hidden&&_blurPendingAt===0){
        violation('Системна шторка','Виявлено зупинку браузера — можливо відкрита шторка сповіщень або інший додаток.');
      }
      _rafId=requestAnimationFrame(rafLoop);
    };
    _rafId=requestAnimationFrame(rafLoop);
  }

  // 2. Fullscreen — моніторинг виходу
  // requestFullscreen вже викликано в confirmMood() з user gesture
  // тут тільки вішаємо слухачі зміни стану
  if(sec.fullscreen){
    document.addEventListener('fullscreenchange',_onFsChange);
    document.addEventListener('webkitfullscreenchange',_onFsChange);
  }

  // 3. Орієнтація — зміна без причини = підозра
  if(sec.tab){
    const _onOrient=()=>{
      if(!examActive||_resultSubmitted)return;
      const newAngle=screen.orientation?.angle??window.orientation??0;
      if(newAngle===_lastOrient)return;
      _lastOrient=newAngle;
      _orientChangeTime=Date.now();
      // Даємо 1.5с на розгортання клавіатури/системного UI
      // Якщо після цього часу висота viewpoint різко менша — плаваюче вікно
      setTimeout(()=>{
        if(!examActive||_resultSubmitted)return;
        // Після зміни орієнтації перевіряємо розміри
        checkSplitScreen();
      },1500);
    };
    if(screen.orientation){
      screen.orientation.addEventListener('change',_onOrient);
    } else {
      window.addEventListener('orientationchange',_onOrient);
    }
  }

  // 4. PiP (Picture-in-Picture) детектор
  if(sec.tab){
    _pipCheckInt=setInterval(()=>{
      if(!examActive||_resultSubmitted)return;
      if(Date.now()-_lastSplitViol<5000)return;
      if(document.pictureInPictureElement){
        _lastSplitViol=Date.now();
        violation('Picture-in-Picture','Виявлено відео у плаваючому вікні — закрийте його.');
      }
      // Document PiP API (Chrome 116+)
      try{
        if(window.documentPictureInPicture?.window){
          _lastSplitViol=Date.now();
          violation('Picture-in-Picture','Виявлено плаваюче вікно документу.');
        }
      }catch(_){}
    },1200);
  }

  // ══ ColorOS / MIUI / OxygenOS ЗАХИСТИ ══

  // C1. ResizeObserver на body — ловить float-вікна ColorOS що не змінюють window.innerWidth
  if(sec.tab&&sec.coloros&&window.ResizeObserver){
    _baseBodyW=document.body.offsetWidth;
    _baseBodyH=document.body.offsetHeight;
    // Затримка 1.5с щоб не зловити первинний layout
    setTimeout(()=>{
      if(!examActive||_resultSubmitted)return;
      _baseBodyW=document.body.offsetWidth;
      _baseBodyH=document.body.offsetHeight;
      _resizeObs=new ResizeObserver(entries=>{
        if(!examActive||_resultSubmitted)return;
        if(Date.now()-_lastSplitViol<5000)return;
        for(const en of entries){
          const {width,height}=en.contentRect;
          // Якщо body раптово став менше ніж 60% від базового — float-вікно
          if(_baseBodyW>0&&width/_baseBodyW<0.60){
            _lastSplitViol=Date.now();
            violation('Розділений екран','Виявлено зміну розміру вікна — можливо активовано плаваюче вікно.');
            break;
          }
          if(_baseBodyH>0&&height/_baseBodyH<0.55){
            _lastSplitViol=Date.now();
            violation('Розділений екран','Виявлено зменшення висоти вікна — можливо активовано розділений екран.');
            break;
          }
        }
      });
      _resizeObs.observe(document.body);
    },1500);
  }

  // C2. devicePixelRatio моніторинг — ColorOS змінює DPR при деяких float-режимах
  if(sec.tab&&sec.coloros){
    _basePixelRatio=window.devicePixelRatio||1;
    _colorosCheckInt=setInterval(()=>{
      if(!examActive||_resultSubmitted)return;
      if(Date.now()-_lastSplitViol<5000)return;
      const curDPR=window.devicePixelRatio||1;
      // Значна зміна DPR під час тесту — ознака масштабування або float-режиму
      if(Math.abs(curDPR-_basePixelRatio)>0.4){
        _lastSplitViol=Date.now();
        violation('Плаваюче вікно','Виявлено зміну масштабу екрана — можливо активовано плаваюче вікно ColorOS.');
      }
    },900);
  }

  // C3. Верхня шторка — touchstart з малим clientY (свайп зверху вниз)
  // Спрацьовує ПІСЛЯ того як фокус втрачено (шторка відкрилась)
  if(sec.tab&&sec.coloros){
    const _onTouchStart=ev=>{
      if(!examActive||_resultSubmitted)return;
      const t=ev.touches[0];
      if(t)_touchStartY=t.clientY;
    };
    const _onTouchEnd=ev=>{
      if(!examActive||_resultSubmitted)return;
      const t=ev.changedTouches[0];
      if(!t)return;
      const dy=t.clientY-_touchStartY;
      // Свайп вниз від самого верху (y < 25px) на довжину > 60px — підозра на шторку
      if(_touchStartY<25&&dy>60){
        clearTimeout(_notifBarTimer);
        _notifBarTimer=setTimeout(()=>{
          if(!examActive||_resultSubmitted)return;
          // Перевіряємо чи фокус справді втрачено — якщо так, це шторка
          if(!document.hasFocus()&&Date.now()-_lastFocusViol>2000){
            _lastFocusViol=Date.now();
            violation('Верхня шторка','Виявлено відкриття панелі сповіщень під час тесту.');
            if(payload.secSettings?.blur)blurBody(true);
          }
        },400);
      }
    };
    document.addEventListener('touchstart',_onTouchStart,{passive:true});
    document.addEventListener('touchend',_onTouchEnd,{passive:true});
  }

  // 5. VisualViewport advanced — висота без фокусу на input
  if(sec.tab&&window.visualViewport){
    _vvCheckInt=setInterval(()=>{
      if(!examActive||_resultSubmitted)return;
      if(Date.now()-_lastSplitViol<5000)return;
      // Перевіряємо чи активний елемент — поле вводу (тоді клавіатура легальна)
      const activeTag=(document.activeElement?.tagName||'').toUpperCase();
      const isInputActive=['INPUT','TEXTAREA','SELECT'].includes(activeTag);
      if(isInputActive)return;
      const vvH=window.visualViewport.height;
      const winH=window.innerHeight;
      // Якщо visualViewport значно менший ніж innerHeight і це не клавіатура
      if(winH>0&&(vvH/winH)<0.75){
        _lastSplitViol=Date.now();
        violation('Плаваюче вікно','Виявлено накладне вікно поверх тесту.');
      }
    },1000);
  }

  // 6. pagehide / pageshow — iOS Back/Forward cache, швидкий перехід
  window.addEventListener('pagehide',_onPageHide);
  window.addEventListener('pageshow',_onPageShow);

  // 7. Інкогніто-детектор через StorageManager
  if(sec.tab){
    _detectIncognito();
  }
}

let _lastSplitViol=0;
function checkSplitScreen(){
  if(!examActive||_resultSubmitted)return;
  if(Date.now()-_lastSplitViol<5000)return;
  const ww=window.innerWidth,sw=window.screen.width;
  const wh=window.innerHeight,sh=window.screen.height;
  if((ww/sw)<0.55||(wh/sh)<0.55){
    _lastSplitViol=Date.now();
    violation('Розділений екран','Виявлено розділений екран або плаваюче вікно.');
    return;
  }
  if(window.visualViewport){
    const vv=window.visualViewport;
    // Стандартна перевірка ширини
    if((vv.width*vv.scale)/sw<0.5){
      _lastSplitViol=Date.now();
      violation('Плаваюче вікно','Виявлено плаваюче або накладне вікно.');
      return;
    }
    // ColorOS: scale відхиляється від 1.0 при float-режимі
    if(Math.abs(vv.scale-1.0)>0.25){
      _lastSplitViol=Date.now();
      violation('Плаваюче вікно','Виявлено масштабування вікна — можливо активовано float-режим ColorOS.');
    }
  }
}
function detachSecurity(){
  clearInterval(_splitCheckInt);_splitCheckInt=null;
  clearInterval(_pipCheckInt);_pipCheckInt=null;
  clearInterval(_vvCheckInt);_vvCheckInt=null;
  clearInterval(_colorosCheckInt);_colorosCheckInt=null;
  clearTimeout(_blurTimer);_blurTimer=null;
  clearTimeout(_fsExitViolTimer);_fsExitViolTimer=null;
  clearTimeout(_rafPauseTimer);_rafPauseTimer=null;
  clearTimeout(_notifBarTimer);_notifBarTimer=null;
  if(_resizeObs){_resizeObs.disconnect();_resizeObs=null;}
  if(_rafId){cancelAnimationFrame(_rafId);_rafId=null;}
  if(window.visualViewport)window.visualViewport.removeEventListener('resize',checkSplitScreen);
  document.removeEventListener('visibilitychange',onVis);
  window.removeEventListener('blur',onBlur);
  document.removeEventListener('contextmenu',onCtx);
  document.removeEventListener('copy',onCopy);
  document.removeEventListener('cut',onCopy);
  document.removeEventListener('keydown',onKey);
  document.removeEventListener('fullscreenchange',_onFsChange);
  document.removeEventListener('webkitfullscreenchange',_onFsChange);
  window.removeEventListener('pagehide',_onPageHide);
  window.removeEventListener('pageshow',_onPageShow);
  if(screen.orientation){try{screen.orientation.removeEventListener('change',()=>{});}catch(_){}}
  // Виходимо з fullscreen якщо були в ньому
  try{if(document.fullscreenElement||document.webkitFullscreenElement){(document.exitFullscreen||document.webkitExitFullscreen).call(document).catch(()=>{});}}catch(_){}
  const wl=g('wmLayer');if(wl)wl.innerHTML='';
}
let _lastFocusViol=0;
function onVis(){
  if(!examActive||_resultSubmitted||!document.hidden)return;
  if(Date.now()-_lastFocusViol<2000)return;
  _lastFocusViol=Date.now();
  violation('Перехід на іншу вкладку','Ви залишили вікно тесту.');
  if(payload.secSettings?.blur)blurBody(true);
}
function onBlur(){
  if(!examActive||_resultSubmitted||document.hidden)return;
  // Мобільний захист: ігноруємо короткочасну втрату фокусу (<600ms)
  // Це запобігає хибним спрацюванням при торканні краю екрана
  _blurPendingAt=Date.now();
  clearTimeout(_blurTimer);
  _blurTimer=setTimeout(()=>{
    if(!examActive||_resultSubmitted||document.hidden){_blurPendingAt=0;return;}
    // Перевіряємо ще раз чи фокус справді втрачений
    if(document.hasFocus()){_blurPendingAt=0;return;}
    if(Date.now()-_lastFocusViol<2000){_blurPendingAt=0;return;}
    _blurPendingAt=0;
    _lastFocusViol=Date.now();
    violation('Втрата фокусу','Перехід до іншого вікна або додатку.');
    if(payload.secSettings?.blur)blurBody(true);
  },600);
}
function onCtx(ev){ev.preventDefault();if(!examActive)return;violation('Контекстне меню','Спроба відкрити контекстне меню.');}
function onCopy(ev){ev.preventDefault();if(!examActive)return;violation('Копіювання','Спроба скопіювати текст тесту.');}
function onKey(ev){
  if(!examActive)return;
  if(ev.key==='PrintScreen'||ev.keyCode===44){ev.preventDefault();flashWhite();violation('Print Screen','Спроба зробити знімок.');return;}
  if(ev.key==='F12'||(ev.ctrlKey&&ev.shiftKey&&'IJCK'.includes(ev.key.toUpperCase()))||(ev.ctrlKey&&ev.key==='u')){ev.preventDefault();violation('DevTools','Спроба відкрити інструменти розробника.');}
}
function blurBody(on){const b=g('body');if(b)b.style.filter=on?'blur(14px)':'';}
function flashWhite(){
  const f=document.createElement('div');
  f.style.cssText='position:fixed;inset:0;background:#fff;z-index:99999;pointer-events:none;';
  document.body.appendChild(f);setTimeout(()=>f.remove(),350);
}

// ══ НОВІ МОБІЛЬНІ ХЕЛПЕРИ ══

// Fullscreen request з підтримкою iOS/Android
function _requestFullscreen(){
  const el=document.documentElement;
  try{
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
    if(req){req.call(el).then(()=>{_fsActive=true;}).catch(()=>{_fsActive=false;});}
  }catch(_){_fsActive=false;}
}

// Fullscreen change handler
function _onFsChange(){
  const isFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  if(_fsActive&&!isFs&&examActive&&!_resultSubmitted){
    // Вийшли з fullscreen під час тесту
    _fsActive=false;
    clearTimeout(_fsExitViolTimer);
    // Даємо 1.5с — може системне сповіщення тимчасово згорнуло
    _fsExitViolTimer=setTimeout(()=>{
      if(!examActive||_resultSubmitted)return;
      const stillFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
      if(!stillFs){
        violation('Вихід з повноекранного режиму','Тест повинен відображатись у повноекранному режимі.');
        // Намагаємось повернути fullscreen
        setTimeout(()=>{if(examActive&&!_resultSubmitted)_requestFullscreen();},800);
      }
    },1500);
  } else if(isFs){
    _fsActive=true;
    clearTimeout(_fsExitViolTimer);
  }
}

// pagehide — фіксуємо час виходу (iOS BFCache)
function _onPageHide(ev){
  if(!examActive||_resultSubmitted)return;
  _pageHideTs=Date.now();
}

// pageshow — якщо повернулись з BFCache і пройшло >3с — це порушення
function _onPageShow(ev){
  if(!examActive||_resultSubmitted)return;
  if(ev.persisted&&_pageHideTs>0){
    const away=Date.now()-_pageHideTs;
    _pageHideTs=0;
    if(away>1500&&Date.now()-_lastFocusViol>2000){
      _lastFocusViol=Date.now();
      violation('Перехід на інший додаток','Ви покинули тест через системну навігацію (iOS).');
      if(payload.secSettings?.blur)blurBody(true);
    }
  }
}

// Інкогніто-детектор через StorageManager quota
async function _detectIncognito(){
  try{
    if(!navigator.storage?.estimate)return;
    const {quota}=await navigator.storage.estimate();
    // В інкогніто Chrome quota ~120MB, Firefox ~0, Safari ~0 або маленьке
    // Нормальний режим: зазвичай >200MB
    if(quota&&quota<150*1024*1024){
      // Затримка щоб не зафіксувати до початку тесту
      setTimeout(()=>{
        if(!examActive||_resultSubmitted)return;
        violation('Анонімний режим','Виявлено ознаки приватного/анонімного режиму браузера.');
      },2000);
    }
  }catch(_){}
}

function buildDots(){
  const max=payload.secSettings?.maxviol||3;
  ['barDots','secVdots'].forEach(id=>{
    const c=g(id);if(!c)return;c.innerHTML='';
    for(let i=0;i<max;i++){const d=document.createElement('div');d.className='vd';d.id=id+'_'+i;c.appendChild(d);}
  });
}
function violation(title,desc){
  if(!examActive||_resultSubmitted)return;
  violCount++;
  examViolations.push({title,desc,time:new Date().toLocaleTimeString('uk-UA'),q:currentQ+1});
  ['barDots','secVdots'].forEach(id=>{const d=g(id+'_'+(violCount-1));if(d)d.classList.add('hit');});
  g('secTitle').textContent=title;
  g('secDesc').textContent=desc+'\n\nПорушення '+violCount+' з '+(payload.secSettings?.maxviol||3)+'.';
  g('secOverlay').classList.add('show');
  if(violCount>=(payload.secSettings?.maxviol||3)){
    setTimeout(()=>{dismissSec();finishExam('violations');},1500);
  }
}
function dismissSec(){g('secOverlay').classList.remove('show');blurBody(false);}

function buildWM(){
  const wl=g('wmLayer');if(wl)wl.innerHTML='';
  const t=studentName+(studentClass?' · '+studentClass:'')+' · SecureQuiz';
  for(let r=-2;r<20;r++)for(let c=-1;c<8;c++){
    const el=document.createElement('div');el.className='wm';el.textContent=t;
    el.style.top=(r*130)+'px';el.style.left=(c*320)+'px';wl.appendChild(el);
  }
}

// ── FIREBASE ──
function sendProgress(data){
  if(!db||!sessionRef)return;
  sessionRef.child('participants/'+participantId).update(data).catch(()=>{});
}

// ── FINISH ──
function finishExam(reason){
  if(_resultSubmitted)return;
  _resultSubmitted=true;
  examActive=false;
  clearInterval(timerInt);clearInterval(perqInt);
  detachSecurity();
  g('bar').style.display='none';g('progBar').style.display='none';
  document.body.setAttribute('data-bg','0');

  // Scoring
  let earned=0,totalPts=0;
  examQs.forEach((q,i)=>{
    const pts=q.points||1; totalPts+=pts;
    const ans=examAnswers[i]||[];
    const corr=_getCorrect(q);
    const ok=q.isMultiple
      ?(ans.length===corr.length&&corr.every(c=>ans.includes(c)))
      :(ans[0]===corr[0]);
    if(ok)earned+=pts;
  });
  const pct=totalPts>0?Math.round(earned/totalPts*100):0;
  const correctCnt=examQs.filter((q,i)=>{
    const ans=examAnswers[i]||[],corr=_getCorrect(q);
    return q.isMultiple?(ans.length===corr.length&&corr.every(c=>ans.includes(c))):(ans[0]===corr[0]);
  }).length;

  // Grade
  const grades=payload.grades||[];
  let grade={l:'1',c:'#7f1d1d',motto:''};
  for(const g2 of grades){if(pct>=g2.m){grade=g2;break;}}

  // Motto from grade or fallback
  const motto=grade.motto||(pct>=75?'Ти топ! Так тримати 🔥':pct>=50?'Ще трохи — і будеш у топі 🚀':pct>=25?'Набираєш обертів! Не зупиняйся 💪':'Старт є — далі тільки вгору 📈');
  const subT=reason==='time'?'⏰ Час вийшов':reason==='violations'?'⛔ Зупинено за порушення':'✅ Тест завершено';

  // Viol log
  let violHtml='';
  if(examViolations.length){
    violHtml=`<div class="viol-log"><div class="viol-log-title">🚨 Порушення (${examViolations.length})</div>
      ${examViolations.map(v=>`<div class="viol-item">[${v.time}] Q${v.q}: <strong style="color:#ef4444">${v.title}</strong></div>`).join('')}
    </div>`;
  }

  // ══ Fingerprint пристрою ══
  const _fp={
    ua:navigator.userAgent.slice(0,80),
    lang:navigator.language,
    tz:Intl.DateTimeFormat().resolvedOptions().timeZone,
    w:screen.width,h:screen.height,
    cores:navigator.hardwareConcurrency||0,
    nonce:_sessionNonce
  };
  // ══ Час відповідей ══
  const times=examAnswers._times||[];
  const avgTime=times.length?Math.round(times.reduce((a,b)=>a+(b||0),0)/times.length):0;
  const fastCount=times.filter(t=>t&&t<1500).length;
  const _timing={avg:avgTime,fastCount,times:times.map(t=>Math.round((t||0)/100)*100)};

  // Save result
  const result={
    sessionId:payload.sessionId,student:studentName,
    cls:studentClass,
    launchClass:studentClass||'',
    test:payload.title||'Тест',subject:payload.subject||'',
    date:new Date().toLocaleDateString('uk-UA'),
    startedAt:payload.startedAt,ts:Date.now(),
    earned:+earned.toFixed(1),total:totalPts,pct,
    grade:grade.l,gradeColor:grade.c,violations:violCount,reason,
    violationsLog:examViolations.map(v=>({title:v.title,desc:v.desc,time:v.time,q:v.q})),
    _fp,_timing,
    answersSnapshot:examQs.map((q,i)=>({
      text:q.text,options:q.options,
      correctIndices:_getCorrect(q),
      isMultiple:!!q.isMultiple,
      given:examAnswers[i]||[]
    }))
  };
  // localStorage fallback — синхронно
  try{const rs=JSON.parse(localStorage.getItem('sqpro_results')||'[]');rs.unshift(result);localStorage.setItem('sqpro_results',JSON.stringify(rs.slice(0,500)));}catch(e){}

  // ══ HMAC підпис + Firebase (async) ══
  (async()=>{
    try{
      const msg=new TextEncoder().encode([result.sessionId,result.student,result.pct,result.ts].join('|'));
      const hmacKey=await crypto.subtle.importKey('raw',new TextEncoder().encode(result.sessionId.slice(0,16).padEnd(16,'0')),{name:'HMAC',hash:'SHA-256'},false,['sign']);
      const sig=await crypto.subtle.sign('HMAC',hmacKey,msg);
      result._sig=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
    }catch(_){}

    if(!db)return;

    // Rate limiting — перевіряємо чи вже є результат від цього учня
    try{
      const existingSnap=await db.ref('results').orderByChild('sessionId').equalTo(result.sessionId).once('value');
      const existing=existingSnap.val()||{};
      const alreadySubmitted=Object.values(existing).some(r=>r.student===result.student&&r.sessionId===result.sessionId);
      if(alreadySubmitted){
        sendProgress({name:studentName,cls:studentClass,status:'done',pct,grade:grade.l,violations:violCount,current:examQs.length,total:examQs.length});
        return;
      }
    }catch(_){}

    try{
      await db.ref('results/'+participantId+'_r').set(result);
    }catch(e){console.warn('Firebase save failed:',e.message);}
    sendProgress({name:studentName,cls:studentClass,status:'done',pct,grade:grade.l,violations:violCount,current:examQs.length,total:examQs.length});
  })();

  // Arc circumference
  const R=54, C=2*Math.PI*R;
  const arc=Math.round(C*pct/100), gap=Math.round(C*(1-pct/100));

  // Grade emoji
  const gradeEmoji=pct>=75?'🏆':pct>=50?'⭐':pct>=25?'💪':'📈';

  g('body').innerHTML=`
    <div class="result-wrap">
      <div class="result-card-new">

        <!-- Motivational motto — prominent at top -->
        <div class="rc-motto-big">${gradeEmoji} ${motto}</div>

        <!-- GRADE — the hero element, huge number -->
        <div class="rc-grade-hero" style="background:linear-gradient(160deg,${grade.c}18 0%,${grade.c}06 100%);border:2.5px solid ${grade.c}35;">
          <div class="rc-grade-label" style="color:${grade.c}88;">ОЦІНКА</div>
          <div class="rc-grade-giant" style="color:${grade.c};">${grade.l}</div>
          <div class="rc-pct" style="color:${grade.c}bb;">${pct}%  &nbsp;·&nbsp;  ${earned.toFixed(1)} / ${totalPts} б.</div>
        </div>

        <!-- Status line -->
        <div style="font-size:.78rem;color:rgba(26,26,46,.45);text-align:center;margin-bottom:10px;">${subT}</div>

        <!-- Stats -->
        <div class="rc-stats">
          <div class="rc-stat"><div class="rc-stat-val" style="color:#16a34a">${correctCnt}</div><div class="rc-stat-lbl">✓ правильно</div></div>
          <div class="rc-stat-div"></div>
          <div class="rc-stat"><div class="rc-stat-val" style="color:#c84b31">${examQs.length-correctCnt}</div><div class="rc-stat-lbl">✗ неправильно</div></div>
          <div class="rc-stat-div"></div>
          <div class="rc-stat"><div class="rc-stat-val" style="color:#f59e0b">${violCount}</div><div class="rc-stat-lbl">⚠ порушень</div></div>
        </div>

        ${violHtml}

        <div class="rc-saved">✓ Результат збережено в журналі вчителя</div>
        <button class="btn-close" onclick="closeWin()">✕ Закрити вікно</button>
      </div>
    </div>`;
}

function closeWin(){
  window.close();
  setTimeout(()=>{
    g('body').innerHTML=`<div style="text-align:center;padding:40px 20px;"><div style="font-size:2rem;margin-bottom:12px;">✅</div><p style="font-size:.9rem;color:rgba(26,26,46,.45);">Тест завершено. Закрийте цю вкладку.</p></div>`;
  },300);
}

function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
